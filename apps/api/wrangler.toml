name = "michi-no-eki"
main = "src/index.ts"
compatibility_date = "2026-07-01"

[assets]
directory = "./dist/assets"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/auth/*"]

[[d1_databases]]
binding = "DB"
database_name = "michieki_db"
database_id = "3098bf1d-be3a-4872-9714-6baac1b8dc0d"
# preview_database_id = "<preview-database-id>"  # 本番と Preview で D1 を分離する場合に設定
migrations_dir = "drizzle"
